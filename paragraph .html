<!--معرفی کردن اینکه از کدام نسخه استفاده میکنیم-->
<!DOCTYPE html>
<html>
<head>
    <title>تمرین پاراگراف</title>
    <meta charset="UTF-8">
</head>
<body>
    <!--سر تیتر اصلی سایت که در هر صحفه فقط یکبار از این استفاده میشود-->
    <h1>
        paragraph
    </h1>
    ---------------------------
    <!--نوشتن یک پاراگراف-->
    <p>
        Hello World
    </p>
    ---------------------------
    <!--هایلایت کردن بخشی از متن-->
    <p>
        <mark>
            Hello World
        </mark>
    </p>
    ---------------------------
    <!--برجسته سازی قسمتی از متن-->
    <P>
        Hello <strong>World</strong>
    </P>
    ---------------------------
    <!--شکستن خط در صفحات اج تی ام ال-->
    <p>
        Hello <br>World
    </p>
    ---------------------------
    <!--نوشتن متن دقیق با داشتن هر نوع فاصله-->
    <pre>Hello           
World
    </pre>
    ---------------------------
</body>
</html>
